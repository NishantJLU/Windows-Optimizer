name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP Bundle
        run: |
          Compress-Archive -Path WinOptimizer.ps1, config.json, Launch-WinOptimizer.bat, README.md, LICENSE -DestinationPath WinOptimizer.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: WinOptimizer.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
